name: Build & Push Docker Image

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  bump-version:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      bumped: ${{ steps.bump.outputs.bumped }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version from commit message
        id: bump
        run: |
          if [ ! -f VERSION ]; then
            echo "ERROR: VERSION file not found" >&2
            exit 1
          fi

          COMMIT_MSG=$(git log -1 --pretty=%s)
          CURRENT=$(cat VERSION | tr -d '[:space:]')

          if ! echo "$CURRENT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: VERSION file contains invalid version: $CURRENT" >&2
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if echo "$COMMIT_MSG" | grep -qE '^feat!:|^.+!:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            BUMPED=true
          elif echo "$COMMIT_MSG" | grep -qE '^feat(\(.+\))?:'; then
            MINOR=$((MINOR + 1)); PATCH=0
            BUMPED=true
          elif echo "$COMMIT_MSG" | grep -qE '^fix(\(.+\))?:'; then
            PATCH=$((PATCH + 1))
            BUMPED=true
          else
            BUMPED=false
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bumped=$BUMPED" >> $GITHUB_OUTPUT
          echo "Commit: $COMMIT_MSG"
          echo "Version: $CURRENT -> $NEW_VERSION (bumped: $BUMPED)"
  
      - name: Generate CHANGELOG with git-cliff
        if: steps.bump.outputs.bumped == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ steps.bump.outputs.version }} --prepend CHANGELOG.md

      - name: Commit VERSION and CHANGELOG
        if: steps.bump.outputs.bumped == 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$NEW_VERSION" > VERSION
          git add VERSION CHANGELOG.md
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]" || {
            echo "ERROR: Failed to commit VERSION and CHANGELOG" >&2
            exit 1
          }
          git tag "v$NEW_VERSION" || {
            echo "ERROR: Failed to create tag v$NEW_VERSION — tag may already exist" >&2
            exit 1
          }
          git push origin main --follow-tags || {
            echo "ERROR: Failed to push — branch may be out of sync" >&2
            exit 1
          }
          git push origin "v$NEW_VERSION" || {
            echo "ERROR: Failed to push tag v$NEW_VERSION" >&2
            exit 1
          }

  build-and-push:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    needs: bump-version
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Read VERSION file
        id: version
        run: echo "value=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=V-Coordinator Schedule Builder
            org.opencontainers.image.description=Browser-based schedule builder with Excel export
            org.opencontainers.image.vendor=antwanchild

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
            APP_COMMIT_SHA=${{ github.sha }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  notify-discord:
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    needs:
      - bump-version
      - build-and-push
    permissions:
      actions: read
      contents: read
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      BUILD_VERSION: ${{ needs.bump-version.outputs.version }}
      BUMP_RESULT: ${{ needs.bump-version.result }}
      BUILD_RESULT: ${{ needs.build-and-push.result }}
    steps:
      - name: Checkout
        if: env.DISCORD_WEBHOOK_URL != ''
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Collect notification metadata
        if: env.DISCORD_WEBHOOK_URL != ''
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$BUMP_RESULT" = "success" ] && [ "$BUILD_RESULT" = "success" ]; then
            STATUS="Build Succeeded"
            ICON="✅"
            COLOR=3066993
          else
            STATUS="Build Failed"
            ICON="❌"
            COLOR=15158332
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRIGGERED_BY="${{ github.actor }}"
            BRANCH="${{ github.ref_name }}"
          else
            TRIGGERED_BY="${{ github.event.workflow_run.actor.login }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
          fi

          COMMIT_MSG=$(git log -1 --pretty=%s | tr '\n' ' ')
          SHORT_SHA=$(git rev-parse --short HEAD)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          VERSION_VALUE="$BUILD_VERSION"

          if [ -z "$VERSION_VALUE" ] && [ -f VERSION ]; then
            VERSION_VALUE=$(tr -d '[:space:]' < VERSION)
          fi

          if [ -z "$VERSION_VALUE" ]; then
            VERSION_VALUE="unknown"
          fi

          readarray -t RUN_TIMES < <(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" --jq '.run_started_at, .updated_at')
          STARTED_AT="${RUN_TIMES[0]}"
          UPDATED_AT="${RUN_TIMES[1]}"
          DURATION_SECONDS=$(( $(date -d "$UPDATED_AT" +%s) - $(date -d "$STARTED_AT" +%s) ))
          DURATION_MINUTES=$(( DURATION_SECONDS / 60 ))
          DURATION_REMAINDER=$(( DURATION_SECONDS % 60 ))
          DURATION="${DURATION_MINUTES}m ${DURATION_REMAINDER}s"

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "icon=$ICON" >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"
          echo "triggered_by=$TRIGGERED_BY" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_VALUE" >> "$GITHUB_OUTPUT"
          echo "commit_msg=$COMMIT_MSG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          DISPLAY_NAME=$(printf '%s' "$REPO_NAME" | sed 's/[-_]/ /g; s/\b./\u&/g')

          payload=$(jq -n \
            --arg title "${{ steps.meta.outputs.icon }} ${DISPLAY_NAME} — ${{ steps.meta.outputs.status }}" \
            --arg url "${{ steps.meta.outputs.run_url }}" \
            --arg version "${{ steps.meta.outputs.version }}" \
            --arg triggered_by "${{ steps.meta.outputs.triggered_by }}" \
            --arg branch "${{ steps.meta.outputs.branch }}" \
            --arg commit "${{ steps.meta.outputs.commit_msg }}" \
            --arg duration "${{ steps.meta.outputs.duration }}" \
            --arg short_sha "${{ steps.meta.outputs.short_sha }}" \
            --arg repo "${{ github.repository }}" \
            --arg run_url "${{ steps.meta.outputs.run_url }}" \
            --arg footer "${DISPLAY_NAME} v${{ steps.meta.outputs.version }} • ${{ github.repository }}" \
            --argjson color "${{ steps.meta.outputs.color }}" \
            '{
              embeds: [
                {
                  title: $title,
                  url: $url,
                  color: $color,
                  fields: [
                    {name: "Version", value: $version, inline: true},
                    {name: "Triggered by", value: $triggered_by, inline: true},
                    {name: "Branch", value: $branch, inline: true},
                    {name: "Commit", value: $commit, inline: false},
                    {name: "Duration", value: $duration, inline: true},
                    {name: "Run", value: ("[View run](" + $run_url + ")"), inline: true},
                    {name: "SHA", value: $short_sha, inline: true}
                  ],
                  footer: {text: $footer}
                }
              ]
            }')
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
