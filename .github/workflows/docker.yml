name: Release Publish

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare-release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      bumped: ${{ steps.bump.outputs.bumped }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version from commit range
        id: bump
        run: |
          if [ ! -f VERSION ]; then
            echo "ERROR: VERSION file not found" >&2
            exit 1
          fi

          CURRENT=$(tr -d '[:space:]' < VERSION)

          if ! echo "$CURRENT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: VERSION file contains invalid version: $CURRENT" >&2
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              RANGE="HEAD^..HEAD"
            else
              RANGE="HEAD"
            fi
          else
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
            PARENT_SHA=$(git rev-list --parents -n 1 "$HEAD_SHA" | awk '{print $2}')
            if [ -n "$PARENT_SHA" ]; then
              RANGE="$PARENT_SHA..$HEAD_SHA"
            else
              RANGE="$HEAD_SHA"
            fi
          fi

          FOUND_MAJOR=false
          FOUND_MINOR=false
          FOUND_PATCH=false

          while IFS= read -r COMMIT_MSG; do
            [ -z "$COMMIT_MSG" ] && continue
            NORMALIZED=$(printf '%s' "$COMMIT_MSG" | tr '[:upper:]' '[:lower:]')

            if echo "$NORMALIZED" | grep -qE '^[a-z]+(\([^)]+\))?!:'; then
              FOUND_MAJOR=true
              break
            elif echo "$NORMALIZED" | grep -qE '^feat(\([^)]+\))?:'; then
              FOUND_MINOR=true
            elif echo "$NORMALIZED" | grep -qE '^fix(\([^)]+\))?:'; then
              FOUND_PATCH=true
            fi
          done < <(git log --format=%s $RANGE)

          if [ "$FOUND_MAJOR" = true ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            BUMPED=true
          elif [ "$FOUND_MINOR" = true ]; then
            MINOR=$((MINOR + 1)); PATCH=0
            BUMPED=true
          elif [ "$FOUND_PATCH" = true ]; then
            PATCH=$((PATCH + 1))
            BUMPED=true
          else
            BUMPED=false
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bumped=$BUMPED" >> $GITHUB_OUTPUT
          echo "Range: $RANGE"
          echo "Version: $CURRENT -> $NEW_VERSION (bumped: $BUMPED)"

      - name: Generate CHANGELOG with git-cliff
        if: steps.bump.outputs.bumped == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ steps.bump.outputs.version }} --prepend CHANGELOG.md

      - name: Commit VERSION and CHANGELOG
        if: steps.bump.outputs.bumped == 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$NEW_VERSION" > VERSION
          git add VERSION CHANGELOG.md
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]" || {
            echo "ERROR: Failed to commit VERSION and CHANGELOG" >&2
            exit 1
          }
          git tag "v$NEW_VERSION" || {
            echo "ERROR: Failed to create tag v$NEW_VERSION — tag may already exist" >&2
            exit 1
          }
          git push origin main --follow-tags || {
            echo "ERROR: Failed to push — branch may be out of sync" >&2
            exit 1
          }
          git push origin "v$NEW_VERSION" || {
            echo "ERROR: Failed to push tag v$NEW_VERSION" >&2
            exit 1
          }

  publish-image:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    needs: prepare-release
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      base_version: ${{ steps.build.outputs.base_version }}
      build_number: ${{ steps.build.outputs.build_number }}
      app_version: ${{ steps.build.outputs.app_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Read base version
        id: version
        run: echo "value=$(tr -d '[:space:]' < VERSION)" >> $GITHUB_OUTPUT
      - name: Compute build suffix
        id: build
        run: |
          BASE_VERSION="${{ steps.version.outputs.value }}"

          if ! echo "$BASE_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: VERSION file contains invalid version: $BASE_VERSION" >&2
            exit 1
          fi

          VERSION_BUMP_COMMIT=$(git log -1 --format=%H -- VERSION)
          if [ -z "$VERSION_BUMP_COMMIT" ]; then
            echo "ERROR: Unable to determine the latest VERSION bump commit" >&2
            exit 1
          fi

          BUILD_NUMBER=$(git rev-list --count --first-parent "${VERSION_BUMP_COMMIT}..HEAD")

          APP_VERSION="${BASE_VERSION}-build${BUILD_NUMBER}"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "Base version: $BASE_VERSION"
          echo "Version bump commit: $VERSION_BUMP_COMMIT"
          echo "Build number: $BUILD_NUMBER"
          echo "App version: $APP_VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=${{ steps.build.outputs.app_version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=V-Coordinator Schedule Builder
            org.opencontainers.image.description=Browser-based schedule builder with Excel export
            org.opencontainers.image.vendor=antwanchild

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ steps.build.outputs.app_version }}
            org.opencontainers.image.base.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            APP_VERSION=${{ steps.build.outputs.app_version }}
            APP_COMMIT_SHA=${{ github.sha }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.build.outputs.app_version }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  notify-release:
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - publish-image
    permissions:
      actions: read
      contents: read
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      BASE_VERSION: ${{ needs.publish-image.outputs.base_version }}
      BUILD_NUMBER: ${{ needs.publish-image.outputs.build_number }}
      BUILD_VERSION: ${{ needs.publish-image.outputs.app_version }}
      BUMP_RESULT: ${{ needs.prepare-release.result }}
      BUILD_RESULT: ${{ needs.publish-image.result }}
    steps:
      - name: Checkout
        if: env.DISCORD_WEBHOOK_URL != ''
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Collect notification metadata
        if: env.DISCORD_WEBHOOK_URL != ''
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$BUMP_RESULT" = "success" ] && [ "$BUILD_RESULT" = "success" ]; then
            STATUS="Build Succeeded"
            ICON="✅"
            COLOR=3066993
          else
            STATUS="Build Failed"
            ICON="❌"
            COLOR=15158332
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRIGGERED_BY="${{ github.actor }}"
            BRANCH="${{ github.ref_name }}"
          else
            TRIGGERED_BY="${{ github.event.workflow_run.actor.login }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
          fi

          COMMIT_MSG=$(git log -1 --pretty=%s | tr '\n' ' ')
          SHORT_SHA=$(git rev-parse --short HEAD)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BASE_VERSION_VALUE="$BASE_VERSION"
          BUILD_NUMBER_VALUE="$BUILD_NUMBER"
          FULL_VERSION_VALUE="$BUILD_VERSION"

          if [ -z "$BASE_VERSION_VALUE" ] && [ -f VERSION ]; then
            BASE_VERSION_VALUE=$(tr -d '[:space:]' < VERSION)
          fi

          if [ -z "$BASE_VERSION_VALUE" ]; then
            BASE_VERSION_VALUE="unknown"
          fi

          if [ -z "$BUILD_NUMBER_VALUE" ]; then
            BUILD_NUMBER_VALUE="unknown"
          fi

          if [ -z "$FULL_VERSION_VALUE" ]; then
            FULL_VERSION_VALUE="$BASE_VERSION_VALUE"
          fi

          readarray -t RUN_TIMES < <(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" --jq '.run_started_at, .updated_at')
          STARTED_AT="${RUN_TIMES[0]}"
          UPDATED_AT="${RUN_TIMES[1]}"
          DURATION_SECONDS=$(( $(date -d "$UPDATED_AT" +%s) - $(date -d "$STARTED_AT" +%s) ))
          DURATION_MINUTES=$(( DURATION_SECONDS / 60 ))
          DURATION_REMAINDER=$(( DURATION_SECONDS % 60 ))
          DURATION="${DURATION_MINUTES}m ${DURATION_REMAINDER}s"

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "icon=$ICON" >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"
          echo "triggered_by=$TRIGGERED_BY" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "base_version=$BASE_VERSION_VALUE" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER_VALUE" >> "$GITHUB_OUTPUT"
          echo "version=$FULL_VERSION_VALUE" >> "$GITHUB_OUTPUT"
          echo "commit_msg=$COMMIT_MSG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          DISPLAY_NAME=$(printf '%s' "$REPO_NAME" | sed 's/[-_]/ /g; s/\b./\u&/g')

          payload=$(jq -n \
            --arg title "${{ steps.meta.outputs.icon }} ${DISPLAY_NAME} — ${{ steps.meta.outputs.status }}" \
            --arg url "${{ steps.meta.outputs.run_url }}" \
            --arg base_version "${{ steps.meta.outputs.base_version }}" \
            --arg build_number "${{ steps.meta.outputs.build_number }}" \
            --arg version "${{ steps.meta.outputs.version }}" \
            --arg triggered_by "${{ steps.meta.outputs.triggered_by }}" \
            --arg branch "${{ steps.meta.outputs.branch }}" \
            --arg commit "${{ steps.meta.outputs.commit_msg }}" \
            --arg duration "${{ steps.meta.outputs.duration }}" \
            --arg short_sha "${{ steps.meta.outputs.short_sha }}" \
            --arg repo "${{ github.repository }}" \
            --arg run_url "${{ steps.meta.outputs.run_url }}" \
            --arg footer "${DISPLAY_NAME} v${{ steps.meta.outputs.version }} • ${{ github.repository }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson color "${{ steps.meta.outputs.color }}" \
            '{
              embeds: [
                {
                  title: $title,
                  url: $url,
                  color: $color,
                  timestamp: $timestamp,
                  fields: [
                    {name: "🏷️ Version", value: $base_version, inline: true},
                    {name: "🔢 Build", value: ("build" + $build_number), inline: true},
                    {name: "👤 Triggered by", value: $triggered_by, inline: true},
                    {name: "🌿 Branch", value: $branch, inline: true},
                    {name: "💬 Commit", value: $commit, inline: false},
                    {name: "⏱️ Duration", value: $duration, inline: true},
                    {name: "🔗 Run", value: ("[View run](" + $run_url + ")"), inline: true},
                    {name: "🔖 SHA", value: $short_sha, inline: true}
                  ],
                  footer: {text: $footer}
                }
              ]
            }')
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
