name: Dependabot Auto-Merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.action != 'closed'
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge minor and patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --rebase --auto "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord when PR is not eligible for auto-merge
        if: env.DISCORD_WEBHOOK_URL != '' && (github.event.action == 'opened' || github.event.action == 'reopened') && steps.meta.outputs.update-type != 'version-update:semver-minor' && steps.meta.outputs.update-type != 'version-update:semver-patch'
        run: |
          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg url "${{ github.event.pull_request.html_url }}" \
            --arg dep "${{ steps.meta.outputs.dependency-names }}" \
            --arg update_type "${{ steps.meta.outputs.update-type }}" \
            '{content: ("Dependabot PR requires review in \($repo): **\($title)**\nDependency: \($dep)\nReason: not eligible for auto-merge (\($update_type))\n\($url)")}') 
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
  notify-merged:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.action == 'closed' && github.event.pull_request.merged == true
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Notify Discord when auto-merge completes
        if: env.DISCORD_WEBHOOK_URL != '' && github.event.pull_request.merged_by.login == 'github-actions[bot]'
        run: |
          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg url "${{ github.event.pull_request.html_url }}" \
            --arg merged_by "${{ github.event.pull_request.merged_by.login }}" \
            '{content: ("Dependabot PR auto-merged in \($repo): **\($title)**\nMerged by: \($merged_by)\n\($url)")}')
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Notify Discord when Dependabot PR is merged manually
        if: env.DISCORD_WEBHOOK_URL != '' && github.event.pull_request.merged_by.login != 'github-actions[bot]'
        run: |
          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg url "${{ github.event.pull_request.html_url }}" \
            --arg merged_by "${{ github.event.pull_request.merged_by.login }}" \
            '{content: ("Dependabot PR merged manually in \($repo): **\($title)**\nMerged by: \($merged_by)\n\($url)")}')
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
