repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: python
        language_version: python3.12
        types_or: [python]
        args: [--check, --diff]
        additional_dependencies:
          - black==25.1.0
      - id: pyright
        name: pyright
        entry: pyright
        language: python
        language_version: python3.12
        pass_filenames: false
        args: [--project, pyproject.toml]
        additional_dependencies:
          - pyright==1.1.404
          - flask==3.1.3
          - gunicorn==26.0.0
          - openpyxl==3.1.5
          - Pillow==12.2.0

